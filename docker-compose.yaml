version: "3.9"

services:
  polygon-tool:
    build: .
    container_name: polygon-tool
    
    expose:
      - "8501"

    restart: unless-stopped

    volumes:
      - ./data:/app/data:ro

    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://localhost:8501/_stcore/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    mem_limit: 1g
    mem_reservation: 512m
    cpus: "1.0"
    pids_limit: 256

    read_only: true

    tmpfs:
      - /tmp:size=256m
      - /root/.streamlit:size=32m

    security_opt:
      - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"